# ~/.config/tmux/theme.conf — tokyo-night-tmux (matches nvim tokyonight-night)
# Plugin is declared/loaded in plugins.conf; these are its options.

set -g @tokyo-night-tmux_theme night        # night | storm | moon | day
set -g @tokyo-night-tmux_transparent 0      # 1 = let terminal background show

# Lean widgets (work with current deps: git, fzf, jq, bc, gdate)
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_show_git 1
set -g @tokyo-night-tmux_show_hostname 0    # off: redundant locally + caused status overflow (re-enable for SSH if wanted)

# Heavier widgets — need `brew install gawk gnu-sed` first. Off by default.
set -g @tokyo-night-tmux_show_battery_widget 0
set -g @tokyo-night-tmux_show_netspeed 0
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_wbg 0
