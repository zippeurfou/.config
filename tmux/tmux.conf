# ~/.config/tmux/tmux.conf — entry point ($XDG_CONFIG_HOME/tmux/tmux.conf)
#
# Prefix: default Ctrl+b (kept simple; an iTerm2 CMD layer can be added later).
# Pane nav is prefix-based, so tmux is invisible to nvim. See DESIGN.md.

source-file ~/.config/tmux/options.conf
source-file ~/.config/tmux/keybindings.conf
source-file ~/.config/tmux/theme.conf
source-file ~/.config/tmux/plugins.conf   # runs TPM last
