# ~/.config/tmux/options.conf — server/session behaviour
# Sourced by tmux.conf

# --- Terminal & truecolor (iTerm2) ---
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# --- General behaviour ---
set -g status-position top       # status bar at the TOP
set -g mouse on                 # click / scroll / resize with the mouse
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1       # panes start at 1
set -g renumber-windows on      # keep window numbers gapless
set -g automatic-rename off     # your window names stick (don't auto-rename)
set -g allow-rename off         # apps can't rename your windows via escape codes
set -g history-limit 100000     # generous scrollback
set -g display-time 2000        # status messages linger 2s
set -g status-interval 5        # refresh status bar every 5s
set -g focus-events on          # let nvim see focus (autoread, etc.)
set -sg escape-time 10          # near-zero esc lag for nvim
set -g set-clipboard on         # OSC52 -> iTerm2 system clipboard

# --- Copy mode: vi keys (matches your nvim / zsh vi-mode) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
# 'y' to copy is provided by tmux-yank (-> pbcopy)
