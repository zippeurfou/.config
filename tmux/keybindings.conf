# ~/.config/tmux/keybindings.conf
# Prefix stays the default Ctrl+b. Pane navigation is PREFIX-BASED so tmux
# intercepts NOTHING without the prefix -> your nvim keys are untouched.
# Every bind has a -N description so `prefix ?` shows a real, accurate cheatsheet.

# Reload + help
bind -N "Reload tmux config" r source-file ~/.config/tmux/tmux.conf \; display "tmux: config reloaded"
bind -N "Show all key bindings (described)" ? display-popup -E -w 80% -h 80% "~/.config/tmux/scripts/cheatsheet.sh"

# --- Splits (nvim <C-w>s / <C-w>v parity), open in current path ---
bind -N "Split stacked (horizontal)"     s split-window -v -c "#{pane_current_path}"
bind -N "Split side-by-side (vertical)"  v split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane navigation: prefix + h/j/k/l ---
bind -N "Select pane left"  h select-pane -L
bind -N "Select pane down"  j select-pane -D
bind -N "Select pane up"    k select-pane -U
bind -N "Select pane right" l select-pane -R

# --- Pane resize: prefix + H/J/K/L (repeatable) ---
bind -N "Resize pane left"  -r H resize-pane -L 5
bind -N "Resize pane down"  -r J resize-pane -D 5
bind -N "Resize pane up"    -r K resize-pane -U 5
bind -N "Resize pane right" -r L resize-pane -R 5

# --- Pane zoom / kill / only (nvim <C-w> m / q / o) ---
bind -N "Zoom / maximize pane"      m resize-pane -Z
bind -N "Kill this pane"            q kill-pane
bind -N "Keep only this pane"       o kill-pane -a

# --- Windows (tabs) ---
bind -N "New window (prompts for name)" c display-popup -E -w 50% -h 20% "~/.config/tmux/scripts/new-window.sh '#{pane_current_path}'"
bind -N "Next window"          -r   n next-window
bind -N "Previous window"      -r   b previous-window
# & kill-window (default, confirm) | , rename (default) | 1-9 select (default)

# --- Sessions ---
# Tab -> sessionx (search/create/kill/preview) is bound in plugins.conf (@sessionx-bind)
bind -N "Project finder (sessionizer)" f display-popup -E -w 75% -h 75% "~/.config/tmux/scripts/sessionizer.sh"
bind -N "New session from this folder" N run-shell "~/.config/tmux/scripts/session-here.sh '#{pane_current_path}'"
bind -N "Next session"     -r ")" switch-client -n
bind -N "Previous session" -r "(" switch-client -p
# d detach (default) | $ rename session (default) | Tab = fuzzy switcher (above)

# --- Floating panes ---
# prefix + p / P -> floax toggle / menu (plugins.conf)
bind -N "Native floating pane (tmux 3.7)" "*" new-pane
